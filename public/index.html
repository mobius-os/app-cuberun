<head>
  <meta charset="utf-8" />

  <link rel="preload" href="%PUBLIC_URL%/fonts/Road_Rage.otf" as="font" type="font/otf" crossorigin>

  <title>CubeRun</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- For August -->
  <script>
    // Cover the Android display cutout on the first completed tap. CubeRun is
    // deliberately hosted in an opaque cross-origin sandbox, so request
    // fullscreen only for this document and let the browser promote the nested
    // fullscreen chain. Desktop pointers keep the normal windowed experience.
    (function () {
      if (window.top === window.self) return;
      var mq = window.matchMedia;
      if (!mq || !mq('(pointer: coarse)').matches) return;
      if (mq && mq('(display-mode: fullscreen)').matches) return;
      var requested = false;
      function reqFs(){
        if (requested || document.fullscreenElement) return;
        requested = true;
        var el = document.documentElement;
        if (!el || !el.requestFullscreen) return;
        var promise;
        try { promise = el.requestFullscreen(); } catch (e) { return; }
        if (promise && promise.catch) promise.catch(function () {});
      }
      window.addEventListener('click', reqFs, { once: true, passive: true });
    })();
  </script>
</body>

</html>
