<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Avoid the cubes!" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="preload" href="%PUBLIC_URL%/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="%PUBLIC_URL%/fonts/commando.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="%PUBLIC_URL%/fonts/Road_Rage.otf" as="font" type="font/otf" crossorigin>
  <link rel="prefetch" as="image" href="%PUBLIC_URL%/cuberun-logo.png">
  <title>CubeRun</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- For August -->
  <script>
    // TEMPORARY on-screen diagnostic for Android notch fullscreen. On first
    // input (capture-phase, so the game's START/steering can't eat it) we try
    // to take the TOP document fullscreen (all Möbius frames are same-origin;
    // the top doc carries viewport-fit=cover) and, if that throws OR rejects,
    // fall back to this game frame. Every attempt prints its exact error. The
    // wrapping readout is removed once we've diagnosed the device.
    (function () {
      if (window.top === window.self) return;
      var mq = window.matchMedia;
      if (mq && mq('(display-mode: fullscreen)').matches) return;

      var lines = [];
      var badge = document.createElement('div');
      badge.style.cssText = 'position:fixed;top:34%;left:6px;right:6px;z-index:2147483647;background:rgba(0,0,0,.82);color:#39ff14;font:12px/1.45 monospace;padding:6px 8px;pointer-events:none;white-space:pre-wrap;word-break:break-word;border-radius:6px';
      function topDoc(){ try { return window.top.document; } catch (e) { return null; } }
      function topSafeTop(){
        var d = topDoc(); if (!d || !d.body) return '?';
        try {
          var p = d.getElementById('__sat');
          if (!p) {
            p = d.createElement('div'); p.id = '__sat';
            p.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;padding-top:env(safe-area-inset-top)';
            d.body.appendChild(p);
          }
          return window.top.getComputedStyle(p).paddingTop;
        } catch (e) { return 'err'; }
      }
      function fsOn(){ try { var d = topDoc(); return !!(d && d.fullscreenElement) || !!document.fullscreenElement; } catch (e) { return !!document.fullscreenElement; } }
      function dm(){ return (mq && mq('(display-mode: fullscreen)').matches) ? 'fs' : (mq && mq('(display-mode: standalone)').matches) ? 'standalone' : 'browser'; }
      function render(){ badge.textContent = 'FS:' + (fsOn() ? 1 : 0) + '  ' + window.innerWidth + 'x' + window.innerHeight + '  dm:' + dm() + '  topSafeTop:' + topSafeTop() + '\n' + lines.join('\n'); }
      function log(s){ lines.push(s); if (lines.length > 6) lines.shift(); render(); }
      function mount(){ if (document.body && !badge.parentNode) { document.body.appendChild(badge); log('ready - tap to fullscreen'); } }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount); else mount();
      document.addEventListener('fullscreenchange', function () { render(); });
      window.addEventListener('resize', function () { render(); });
      function tryFs(getEl, label, next){
        var el;
        try { el = getEl(); } catch (e) { log(label + ': access-throw ' + (e && e.name)); next && next(); return; }
        if (!el || !el.requestFullscreen) { log(label + ': no-el'); next && next(); return; }
        var p;
        try { p = el.requestFullscreen(); } catch (e) { log(label + ': call-throw ' + (e && e.name) + ' "' + (e && e.message || '') + '"'); next && next(); return; }
        p.then(function () { log(label + ': OK'); render(); }).catch(function (e) { log(label + ': rej ' + (e && e.name) + ' "' + (e && e.message || '') + '"'); next && next(); });
      }
      function reqFs(){
        if (fsOn()) { log('alreadyFS'); return; }
        tryFs(function () { var d = topDoc(); return d && d.documentElement; }, 'TOP', function () {
          tryFs(function () { return document.documentElement; }, 'LOCAL', null);
        });
      }
      ['pointerdown', 'touchstart', 'click'].forEach(function (t) { window.addEventListener(t, reqFs, { capture: true, passive: true }); });
    })();
  </script>
</body>

</html>
